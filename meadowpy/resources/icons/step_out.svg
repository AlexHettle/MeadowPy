<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none">
  <!-- Step Out: upward arrow out of a line -->
  <!-- Horizontal line (function exit) -->
  <line x1="5" y1="5" x2="19" y2="5" stroke="#1976D2" stroke-width="2" stroke-linecap="round"/>
  <!-- Vertical arrow shaft -->
  <line x1="12" y1="10" x2="12" y2="21" stroke="#1976D2" stroke-width="2" stroke-linecap="round"/>
  <!-- Arrowhead pointing up -->
  <polygon points="12,7 8,12 16,12" fill="#1976D2"/>
</svg>
